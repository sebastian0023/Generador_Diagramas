name: CD

on:
  push:
    branches: [main]

# Prevent concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPO: diagram-generator/backend

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write   # required for OIDC auth to AWS
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── AWS auth via OIDC (no long-lived keys) ──────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── ECR login ────────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push image ───────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Write .env to EC2 via SSH ────────────────────────────────────────────
      - name: Write .env on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cat > /opt/diagram-generator/.env << 'EOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NODE_ENV=production
            PORT=3000
            AWS_REGION=${{ env.AWS_REGION }}
            S3_BUCKET=${{ secrets.S3_BUCKET }}
            CORS_ALLOWED_ORIGIN=${{ secrets.CORS_ALLOWED_ORIGIN }}
            EOF
            chmod 600 /opt/diagram-generator/.env

      # ── Deploy on EC2 ────────────────────────────────────────────────────────
      - name: Deploy new image on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/diagram-generator

            # Update image tag to the exact SHA for reproducibility
            sed -i "s|:latest|:${{ github.sha }}|g" docker-compose.prod.yml

            # ECR login + pull + bring up
            /usr/local/bin/ecr-login
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Health check - wait up to 60s
            echo "Waiting for health check..."
            for i in $(seq 1 12); do
              STATUS=$(curl -sf http://localhost:3000/health && echo "ok" || echo "fail")
              if [ "$STATUS" = "ok" ]; then
                echo "Health check passed"
                exit 0
              fi
              echo "Attempt $i/12 - waiting 5s..."
              sleep 5
            done
            echo "Health check failed after 60s"
            exit 1

      # ── Clean up old ECR images (keep last 5) ────────────────────────────────
      - name: Prune old ECR images
        if: success()
        run: |
          IMAGES=$(aws ecr describe-images \
            --repository-name $ECR_REPO \
            --query 'sort_by(imageDetails, &imagePushedAt)[*].imageDigest' \
            --output json | jq -r '.[]')
          TOTAL=$(echo "$IMAGES" | wc -l)
          KEEP=5
          if [ "$TOTAL" -gt "$KEEP" ]; then
            DELETE=$(echo "$IMAGES" | head -n $(($TOTAL - $KEEP)))
            for digest in $DELETE; do
              aws ecr batch-delete-image \
                --repository-name $ECR_REPO \
                --image-ids imageDigest=$digest || true
            done
          fi
